services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - plex-search-net

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    depends_on:
      - ollama
    networks:
      - plex-search-net
    env_file: .env
    volumes:
      - chroma-data:/data/chroma

  ollama:
    build: ./ollama
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    networks:
      - plex-search-net
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}

networks:
  plex-search-net:

volumes:
  ollama-data:
  chroma-data:
